pluginManagement {
    includeBuild("../node_modules/@react-native/gradle-plugin")
}

plugins {
    id("com.facebook.react.settings")
}

if (file("../node_modules/react-native").exists()) {
    extensions.configure(com.facebook.react.ReactSettingsExtension) { ex ->
        ex.autolinkLibrariesFromCommand()
    }
} else {
    println("react-native not found in node_modules; skipping autolinkLibrariesFromCommand")
}

rootProject.name = "Pavi_Detox_MobileAuto"

include(":app")
includeBuild("../node_modules/@react-native/gradle-plugin")